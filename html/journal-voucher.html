<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Journal Voucher (Account Adjustment) — Jeevika Accounting</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        .list-container { display: flex; flex-direction: column; height: calc(100vh - 180px); }
        .table-wrapper { flex: 1; overflow: auto; background: white; border-radius: 8px; border: 1px solid var(--border); }
        .action-sidebar { width: 180px; display: flex; flex-direction: column; gap: 10px; padding-left: 20px; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: white; width: 850px; border-radius: 10px; display: flex; flex-direction: column; box-shadow: var(--shadow-lg); overflow: hidden; border: 1px solid #666; }
        .modal-header { padding: 12px 20px; background: #666; color: white; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 25px; }
        
        .entry-table { border: 1px solid var(--border); margin: 20px 0; border-radius: 4px; overflow: hidden; }
        .entry-table table { width:100%; border-collapse: collapse; }
        .entry-table th { background: #f1f3f5; padding: 10px; text-align: left; font-size: 12px; }
        .entry-table td { padding: 8px; border-top: 1px solid #eee; }
        .entry-table input, .entry-table select { border: 1px solid #ddd; padding: 5px; width: 100%; border-radius:3px; }
        
        .totals-bar { display: flex; justify-content: flex-end; padding: 10px; background: #f8f9fa; gap: 40px; font-weight: 800; font-size: 14px; }
        .balance-status { text-align: center; font-weight: 800; padding: 10px; margin-top: 10px; border-radius: 6px; }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><div class="logo-icon">J</div><div class="logo-text"><h2>jeevika</h2><span>accounting</span></div></div>
        <nav class="sidebar-nav">
            <div class="nav-item"><a href="dashboard.html"><span class="icon">📊</span> Dashboard</a></div>
            <div class="nav-item"><a href="masters.html"><span class="icon">📋</span> Masters</a></div>
            <div class="nav-item"><a href="transactions.html" class="active"><span class="icon">💰</span> Transactions</a></div>
            <div class="nav-item"><a href="reports.html"><span class="icon">📈</span> Reports</a></div>
        </nav>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left">
                <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                <div><div class="page-title">Journal Voucher Register</div><div class="breadcrumb">Transactions / Journal Voucher</div></div>
            </div>
            <div class="topbar-right">
                <div class="topbar-profile"><div class="avatar">A</div><div class="profile-info"><div class="name">Admin</div><div class="role">Super Admin</div></div></div>
            </div>
        </header>

        <main class="page-content">
            <div style="display: flex;">
                <div class="list-container" style="flex: 1;">
                    <div class="table-wrapper">
                        <table class="data-table" id="jrTable">
                            <thead>
                                <tr>
                                    <th style="width: 40px;"><input type="checkbox" onclick="toggleSelectAll(this)"></th>
                                    <th>Vou.No.</th>
                                    <th>Vou.Date</th>
                                    <th>Entries (Summary)</th>
                                    <th class="amount">Total Debit</th>
                                    <th class="amount">Total Credit</th>
                                    <th>Particulars</th>
                                </tr>
                            </thead>
                            <tbody id="jrTableBody"></tbody>
                        </table>
                    </div>
                </div>

                <div class="action-sidebar">
                    <button class="btn-primary" style="width: 100%; background: #666;" onclick="openVouModal()">Add</button>
                    <button class="btn-secondary" style="width: 100%;" onclick="alterVou()">Alter</button>
                    <button class="btn-secondary" style="width: 100%; color:var(--danger)" onclick="multiDelete()">Delete</button>
                    <button class="btn-secondary" style="margin-top: auto;" onclick="location.href='transactions.html'">Exit</button>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="vouModal">
        <div class="modal-card">
            <div class="modal-header"><h3>Journal Voucher Add</h3><button onclick="closeVouModal()" style="background:none; border:none; color:white; font-size:24px;">&times;</button></div>
            <div class="modal-body">
                <div style="display:grid; grid-template-columns: 1fr 1.5fr; gap:25px;">
                    <div class="form-group"><label class="form-label">Voucher No.</label><input type="text" id="vouNo" class="form-input" readonly></div>
                    <div class="form-group"><label class="form-label">Date</label><input type="text" id="vouDate" class="form-input date-picker"></div>
                </div>

                <div class="entry-table">
                    <table>
                        <thead>
                            <tr><th style="width:300px;">Account Head</th><th style="width:80px;">D/C</th><th style="width:120px; text-align:right;">Amount (₹)</th><th></th></tr>
                        </thead>
                        <tbody id="linesBody"></tbody>
                    </table>
                    <div style="padding:10px;"><button class="btn-secondary" style="font-size:11px; padding:5px 10px;" onclick="addLine()">+ Add Line</button></div>
                    <div class="totals-bar">
                        <span>Debit: ₹<span id="totDr">0.00</span></span>
                        <span>Credit: ₹<span id="totCr">0.00</span></span>
                    </div>
                </div>
                
                <div id="balanceMsg" class="balance-status" style="display:none;"></div>
                <div class="form-group"><label class="form-label">Particular (Description)</label><textarea id="vouParticular" class="form-input" rows="2"></textarea></div>
                
                <div style="display:flex; justify-content:center; gap:20px; margin-top:20px;">
                    <button class="btn-primary" id="saveBtn" onclick="saveVou()">Save Journal</button>
                    <button class="btn-secondary" onclick="closeVouModal()">Exit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="../js/global.js"></script>
    <script src="../js/masters-brain.js"></script>
    <script src="../js/transactions-brain.js"></script>
    <script>
        const ACCOUNTS = [
            { code: '002', name: 'Water Charges' }, { code: '004', name: 'Electricity Charges' },
            { code: '019', name: 'CGST Payable' }, { code: '020', name: 'SGST Payable' },
            { code: '021', name: 'Sinking Fund' }, { code: '202', name: 'Cash in Hand' }
        ];

        let lines = [{ acc: '', type: 'dr', amt: 0 }];

        function renderLines() {
            const tbody = document.getElementById('linesBody');
            tbody.innerHTML = lines.map((l, i) => `
                <tr>
                    <td>
                        <select onchange="updateLine(${i}, 'acc', this.value)">
                            <option value="">-- Account --</option>
                            ${ACCOUNTS.map(a => `<option value="${a.code}" ${l.acc == a.code ? 'selected' : ''}>${a.code} — ${a.name}</option>`).join('')}
                        </select>
                    </td>
                    <td>
                        <select onchange="updateLine(${i}, 'type', this.value)" style="width:60px;">
                            <option value="dr" ${l.type == 'dr' ? 'selected' : ''}>Dr.</option>
                            <option value="cr" ${l.type == 'cr' ? 'selected' : ''}>Cr.</option>
                        </select>
                    </td>
                    <td><input type="number" value="${l.amt}" oninput="updateLine(${i}, 'amt', this.value)" style="text-align:right;"></td>
                    <td><button onclick="removeLine(${i})" style="border:none; background:none; color:red; cursor:pointer;">&times;</button></td>
                </tr>
            `).join('');
            calculateTotals();
        }

        function addLine() { lines.push({ acc: '', type: 'dr', amt: 0 }); renderLines(); }
        function removeLine(i) { if(lines.length > 1) { lines.splice(i, 1); renderLines(); } }
        function updateLine(i, field, val) { 
            lines[i][field] = field == 'amt' ? parseFloat(val) || 0 : val;
            calculateTotals();
        }

        function calculateTotals() {
            let dr = 0, cr = 0;
            lines.forEach(l => { if(l.type == 'dr') dr += l.amt; else cr += l.amt; });
            document.getElementById('totDr').textContent = dr.toFixed(2);
            document.getElementById('totCr').textContent = cr.toFixed(2);
            
            const msg = document.getElementById('balanceMsg');
            if(dr === cr && dr > 0) {
                msg.textContent = "✓ Debit Matches Credit"; msg.style.display = 'block'; msg.style.background = '#e8f5e9'; msg.style.color = '#2e7d32';
                document.getElementById('saveBtn').disabled = false;
            } else if(dr !== cr) {
                msg.textContent = "⚠ Mismatch: ₹" + Math.abs(dr - cr).toFixed(2); msg.style.display = 'block'; msg.style.background = '#ffebee'; msg.style.color = '#c62828';
                document.getElementById('saveBtn').disabled = true;
            } else { msg.style.display = 'none'; }
        }

        function renderTable() {
            const data = TransactionsBrain.getVouchers('journal');
            document.getElementById('jrTableBody').innerHTML = data.map(d => `
                <tr data-no="${d.no}">
                    <td><input type="checkbox" class="row-cb"></td>
                    <td>${d.no}</td>
                    <td>${d.date}</td>
                    <td style="font-size:11px;">${d.lines.map(l => ACCOUNTS.find(a=>a.code==l.acc)?.name).join(', ')}</td>
                    <td class="amount">${formatCurrency(d.totalDr)}</td>
                    <td class="amount">${formatCurrency(d.totalCr)}</td>
                    <td>${d.particular}</td>
                </tr>
            `).join('');
        }

        function openVouModal(edit = null) {
            document.getElementById('vouNo').value = edit ? edit.no : 'JV-' + TransactionsBrain.getNextNo('JV');
            document.getElementById('vouDate').value = edit ? edit.date : new Date().toLocaleDateString('en-GB');
            document.getElementById('vouParticular').value = edit ? edit.particular : '';
            lines = edit ? JSON.parse(JSON.stringify(edit.lines)) : [{ acc: '', type: 'dr', amt: 0 }];
            document.getElementById('vouModal').style.display = 'flex';
            renderLines();
        }

        function saveVou() {
            const vou = {
                no: document.getElementById('vouNo').value,
                date: document.getElementById('vouDate').value,
                lines: lines,
                totalDr: parseFloat(document.getElementById('totDr').textContent),
                totalCr: parseFloat(document.getElementById('totCr').textContent),
                particular: document.getElementById('vouParticular').value
            };
            TransactionsBrain.saveVoucher(vou, 'journal');
            closeVouModal(); renderTable(); showToast('Journal record saved');
        }

        function closeVouModal() { document.getElementById('vouModal').style.display = 'none'; }
        
        function alterVou() {
            const selected = document.querySelectorAll('.row-cb:checked');
            if (selected.length !== 1) { showToast('Please select exactly one record to alter', 'error'); return; }
            const no = selected[0].closest('tr').dataset.no;
            const data = TransactionsBrain.getVouchers('journal');
            const vou = data.find(d => d.no === no);
            if (vou) openVouModal(vou);
        }

        function multiDelete() {
            const selected = document.querySelectorAll('.row-cb:checked');
            if (selected.length === 0) { showToast('Please select records to delete', 'error'); return; }
            if (confirm(`Delete ${selected.length} records?`)) {
                const ids = Array.from(selected).map(cb => cb.closest('tr').dataset.no);
                TransactionsBrain.delete(TRANS_DB.JOURNAL_VOUCHERS, ids, 'no');
                renderTable(); showToast(`Deleted ${selected.length} records`);
            }
        }

        function toggleSelectAll(m) { document.querySelectorAll('.row-cb').forEach(c => c.checked = m.checked); }
        document.addEventListener('DOMContentLoaded', renderTable);
    </script>
</body>
</html>
