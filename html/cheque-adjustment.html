<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Member Adjustment (Cheque Return) — Jeevika Accounting</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
    <style>
        .list-container { display: flex; flex-direction: column; height: calc(100vh - 180px); }
        .table-wrapper { flex: 1; overflow: auto; background: white; border-radius: 8px; border: 1px solid var(--border); }
        .action-sidebar { width: 180px; display: flex; flex-direction: column; gap: 10px; padding-left: 20px; }
        .btn-action { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: #f8f9fa; cursor: pointer; font-weight: 600; text-align: left; }
        .btn-action:hover { background: #e9ecef; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: white; width: 700px; max-height: 90vh; border-radius: 12px; display: flex; flex-direction: column; box-shadow: var(--shadow-lg); }
        .modal-header { padding: 16px 24px; background: #6c757d; color: white; border-top-left-radius: 12px; border-top-right-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 24px; overflow-y: auto; }
        .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; }
        
        .balance-info { display: flex; justify-content: space-around; background: #f8f9fa; padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 13px; border: 1px dashed var(--border); }
        .info-pill { text-align: center; }
        .info-pill span { display: block; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><div class="logo-icon">J</div><div class="logo-text"><h2>jeevika</h2><span>accounting</span></div></div>
        <nav class="sidebar-nav">
            <div class="nav-item"><a href="dashboard.html"><span class="icon">📊</span> Dashboard</a></div>
            <div class="nav-item"><a href="masters.html"><span class="icon">📋</span> Masters</a></div>
            <div class="nav-item"><a href="transactions.html" class="active"><span class="icon">💰</span> Transactions</a></div>
            <div class="nav-item"><a href="reports.html"><span class="icon">📈</span> Reports</a></div>
        </nav>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left">
                <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                <div><div class="page-title">Member Adjustment (Cheque Return)</div><div class="breadcrumb">Transactions / Cheque Return</div></div>
            </div>
            <div class="topbar-right">
                <span class="topbar-date" id="currentDate"></span>
                <div class="topbar-profile"><div class="avatar">A</div><div class="profile-info"><div class="name">Admin</div><div class="role">Super Admin</div></div></div>
            </div>
        </header>

        <main class="page-content">
            <div style="display: flex;">
                <div class="list-container" style="flex: 1;">
                    <div class="table-wrapper">
                        <table class="data-table" id="adjTable">
                            <thead>
                                <tr>
                                    <th style="width: 40px;"><input type="checkbox" onclick="toggleSelectAll(this)"></th>
                                    <th>No.</th>
                                    <th>Date</th>
                                    <th>Cash/Bank Account</th>
                                    <th>Flat No</th>
                                    <th>Mem. Name</th>
                                    <th class="amount">Amount</th>
                                    <th>Chq. No.</th>
                                </tr>
                            </thead>
                            <tbody id="adjTableBody"></tbody>
                        </table>
                    </div>
                </div>

                <div class="action-sidebar">
                    <button class="btn-primary" style="width: 100%;" onclick="openAdjModal()">Add</button>
                    <button class="btn-action" onclick="alterAdj()">Alter</button>
                    <button class="btn-action" onclick="deleteAdj()">Delete</button>
                    <button class="btn-action" onclick="multiDelete()">Multi Delete</button>
                    <button class="btn-secondary" style="margin-top: auto;" onclick="exportPDF('adjTable', 'Cheque_Return_Register')">Print Register</button>
                    <button class="btn-secondary" onclick="location.href='transactions.html'">Exit</button>
                </div>
            </div>
        </main>
    </div>

    <!-- ADD MODAL -->
    <div class="modal-overlay" id="adjModal">
        <div class="modal-card">
            <div class="modal-header"><h3>Member Adjustment Add</h3><button onclick="closeAdjModal()" style="background:none; border:none; color:white; font-size:24px;">&times;</button></div>
            <div class="modal-body">
                <div class="balance-info">
                    <div class="info-pill">Principal<span id="balPrincipal">0.00</span></div>
                    <div class="info-pill">Interest<span id="balInterest">0.00</span></div>
                    <div class="info-pill">Total Dues<span id="balTotal">0.00</span></div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <div class="form-group"><label class="form-label">No.</label><input type="text" id="adjNo" class="form-input" readonly></div>
                    <div class="form-group"><label class="form-label">Reference No. (Receipt)</label><input type="text" id="refNo" class="form-input" placeholder="Enter Receipt No" onchange="fetchReceiptDetails()"></div>
                    <div class="form-group"><label class="form-label">Date</label><input type="text" id="adjDate" class="form-input date-picker"></div>
                </div>

                <div class="form-group"><label class="form-label">Member</label><input type="text" id="adjMember" class="form-input" readonly></div>
                
                <div class="form-group"><label class="form-label">Cash / Bank Account</label>
                    <select id="adjBank" class="form-input">
                        <option>The Saraswat Bank A/C-335200100000559</option>
                        <option>The M.D.C.C. Bank A/C -31/10/06/046</option>
                    </select>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <div class="form-group"><label class="form-label">Cheque No.</label><input type="text" id="chqNo" class="form-input"></div>
                    <div class="form-group"><label class="form-label">Cheque Date</label><input type="text" id="chqDate" class="form-input date-picker"></div>
                </div>

                <div class="form-group"><label class="form-label">Drawn on (Bank)</label><input type="text" id="drawnOn" class="form-input"></div>
                <div class="form-group"><label class="form-label">Against (Bill Reference)</label><input type="text" id="against" class="form-input"></div>
                <div class="form-group"><label class="form-label">Particular</label><input type="text" id="adjParticular" class="form-input"></div>

                <div style="display: flex; gap: 40px; align-items: center; background: #fff9db; padding: 15px; border-radius: 8px;">
                    <div class="form-group" style="margin:0;"><label class="form-label">Return Amount</label><input type="number" id="adjAmount" class="form-input" style="font-weight:800; font-size:18px;"></div>
                    <div style="flex:1; display:flex; gap:15px;">
                        <div class="form-group" style="margin:0;"><label class="form-label">Principal</label><input type="number" id="pBifur" class="form-input"></div>
                        <div class="form-group" style="margin:0;"><label class="form-label">Interest</label><input type="number" id="iBifur" class="form-input" value="0"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer"><button class="btn-primary" onclick="saveAdj()">Save</button><button class="btn-secondary" onclick="closeAdjModal()">Exit</button></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="../js/global.js"></script>
    <script src="../js/masters-brain.js"></script>
    <script src="../js/transactions-brain.js"></script>
    <script>
        function renderTable() {
            const data = TransactionsBrain.getChequeReturns();
            document.getElementById('adjTableBody').innerHTML = data.map(d => `
                <tr data-no="${d.no}">
                    <td><input type="checkbox" class="row-cb"></td>
                    <td>${d.no}</td>
                    <td>${d.date}</td>
                    <td style="font-size:11px;">${d.bankAccount}</td>
                    <td>${d.memberCode}</td>
                    <td>${d.memberName}</td>
                    <td class="amount">${formatCurrency(d.amount)}</td>
                    <td>${d.chqNo}</td>
                </tr>
            `).join('');
        }
        
        function openAdjModal(editObj = null) {
            document.getElementById('adjNo').value = editObj ? editObj.no : TransactionsBrain.getNextNo('MA');
            document.getElementById('adjDate').value = editObj ? editObj.date : new Date().toLocaleDateString('en-GB');
            document.getElementById('refNo').value = editObj ? editObj.refNo : '';
            document.getElementById('adjMember').value = editObj ? `${editObj.memberCode} — ${editObj.memberName}` : '';
            document.getElementById('chqNo').value = editObj ? editObj.chqNo : '';
            document.getElementById('adjAmount').value = editObj ? editObj.amount : '';
            document.getElementById('pBifur').value = editObj ? editObj.amount : '';
            document.getElementById('adjModal').style.display = 'flex';
        }
        
        function closeAdjModal() { document.getElementById('adjModal').style.display = 'none'; }
        
        function fetchReceiptDetails() {
            const ref = document.getElementById('refNo').value;
            const rcpt = TransactionsBrain.findReceipt(ref);
            if (rcpt) {
                document.getElementById('adjMember').value = `${rcpt.memberCode} — ${rcpt.memberName}`;
                document.getElementById('chqNo').value = rcpt.chqNo;
                document.getElementById('adjAmount').value = rcpt.amount;
                document.getElementById('pBifur').value = rcpt.amount;
                document.getElementById('drawnOn').value = rcpt.bankName || '';
                document.getElementById('adjBank').value = rcpt.depositedBank || document.getElementById('adjBank').options[0].text;
                showToast('Receipt details fetched');
            } else {
                showToast('Receipt not found', 'warning');
            }
        }
        
        function saveAdj() {
            const entry = {
                no: document.getElementById('adjNo').value,
                date: document.getElementById('adjDate').value,
                refNo: document.getElementById('refNo').value,
                memberCode: document.getElementById('adjMember').value.split(' — ')[0],
                memberName: document.getElementById('adjMember').value.split(' — ')[1],
                bankAccount: document.getElementById('adjBank').value,
                chqNo: document.getElementById('chqNo').value,
                amount: parseFloat(document.getElementById('adjAmount').value),
                particular: document.getElementById('adjParticular').value
            };
            TransactionsBrain.saveChequeReturn(entry);
            closeAdjModal();
            renderTable();
            showToast('Adjustment saved successfully');
        }

        function toggleSelectAll(m) { document.querySelectorAll('.row-cb').forEach(c => c.checked = m.checked); }
        document.addEventListener('DOMContentLoaded', renderTable);
    </script>
</body>
</html>
