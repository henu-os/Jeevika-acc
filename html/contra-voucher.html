<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Contra Voucher (Fund Transfer) — Jeevika Accounting</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        .list-container { display: flex; flex-direction: column; height: calc(100vh - 180px); }
        .table-wrapper { flex: 1; overflow: auto; background: white; border-radius: 8px; border: 1px solid var(--border); }
        .action-sidebar { width: 180px; display: flex; flex-direction: column; gap: 10px; padding-left: 20px; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: white; width: 600px; border-radius: 10px; display: flex; flex-direction: column; box-shadow: var(--shadow-lg); overflow: hidden; border: 1px solid var(--primary); }
        .modal-header { padding: 15px 20px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 25px; }
        
        .transfer-path { display: flex; align-items: center; justify-content: space-between; margin: 20px 0; }
        .path-box { flex: 1; padding: 15px; background: #f8f9fa; border-radius: 8px; border: 1px solid #eee; }
        .path-arrow { width: 40px; text-align: center; font-size: 24px; color: var(--primary); }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><div class="logo-icon">J</div><div class="logo-text"><h2>jeevika</h2><span>accounting</span></div></div>
        <nav class="sidebar-nav">
            <div class="nav-item"><a href="dashboard.html"><span class="icon">📊</span> Dashboard</a></div>
            <div class="nav-item"><a href="masters.html"><span class="icon">📋</span> Masters</a></div>
            <div class="nav-item"><a href="transactions.html" class="active"><span class="icon">💰</span> Transactions</a></div>
            <div class="nav-item"><a href="reports.html"><span class="icon">📈</span> Reports</a></div>
        </nav>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left">
                <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                <div><div class="page-title">Contra Voucher List</div><div class="breadcrumb">Transactions / Contra Voucher</div></div>
            </div>
            <div class="topbar-right">
                <div class="topbar-profile"><div class="avatar">A</div><div class="profile-info"><div class="name">Admin</div><div class="role">Super Admin</div></div></div>
            </div>
        </header>

        <main class="page-content">
            <div style="display: flex;">
                <div class="list-container" style="flex: 1;">
                    <div class="table-wrapper">
                        <table class="data-table" id="contraTable">
                            <thead>
                                <tr>
                                    <th style="width: 40px;"><input type="checkbox" onclick="toggleSelectAll(this)"></th>
                                    <th>Vou.No.</th>
                                    <th>Vou.Date</th>
                                    <th>From (Credit)</th>
                                    <th>To (Debit)</th>
                                    <th class="amount">Amount</th>
                                    <th>Ref/Chq</th>
                                </tr>
                            </thead>
                            <tbody id="contraTableBody"></tbody>
                        </table>
                    </div>
                </div>

                <div class="action-sidebar">
                    <button class="btn-primary" style="width: 100%;" onclick="openVouModal()">Add</button>
                    <button class="btn-secondary" style="width: 100%;" onclick="alterVou()">Alter</button>
                    <button class="btn-secondary" style="width: 100%; color:var(--danger)" onclick="multiDelete()">Delete</button>
                    <button class="btn-secondary" style="width: 100%;" onclick="downloadTemplate()">🔽 Template</button>
                    <button class="btn-secondary" style="width: 100%;" onclick="document.getElementById('excelUpload').click()">🔼 Upload</button>
                    <input type="file" id="excelUpload" style="display:none;" onchange="handleExcelUpload(this)">
                    <button class="btn-secondary" style="margin-top: auto;" onclick="location.href='transactions.html'">Exit</button>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="vouModal">
        <div class="modal-card">
            <div class="modal-header"><h3>Contra Voucher Add</h3><button onclick="closeVouModal()" style="background:none; border:none; color:white; font-size:24px;">&times;</button></div>
            <div class="modal-body">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div class="form-group"><label class="form-label">Voucher No.</label><input type="text" id="vouNo" class="form-input" readonly></div>
                    <div class="form-group"><label class="form-label">Date</label><input type="text" id="vouDate" class="form-input date-picker"></div>
                </div>

                <div class="transfer-path">
                    <div class="path-box">
                        <label class="form-label" style="color:var(--danger);">(Cr.) From Account</label>
                        <select id="fromAcc" class="form-input">
                            <option>Cash in Hand</option>
                            <option>The Saraswat Bank A/C-335200100000559</option>
                        </select>
                    </div>
                    <div class="path-arrow">➜</div>
                    <div class="path-box">
                        <label class="form-label" style="color:var(--success);">(Dr.) To Account</label>
                        <select id="toAcc" class="form-input">
                            <option>The Saraswat Bank A/C-335200100000559</option>
                            <option>Cash in Hand</option>
                        </select>
                    </div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div class="form-group"><label class="form-label">Transfer Amount</label><input type="number" id="vouAmount" class="form-input" style="font-weight:800; font-size:18px;"></div>
                    <div class="form-group"><label class="form-label">Ref / Cheque No.</label><input type="text" id="chqNo" class="form-input"></div>
                </div>

                <div class="form-group"><label class="form-label">Narration</label><input type="text" id="vouParticular" class="form-input" placeholder="e.g. Cash deposited in Bank"></div>
                
                <div style="display:flex; justify-content:center; gap:20px; margin-top:20px;">
                    <button class="btn-primary" onclick="saveVou()">Save Contra</button>
                    <button class="btn-secondary" onclick="closeVouModal()">Exit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="../js/global.js"></script>
    <script src="../js/transactions-brain.js"></script>
    <script>
        function renderTable() {
            const data = TransactionsBrain.getVouchers('contra');
            document.getElementById('contraTableBody').innerHTML = data.map(d => `
                <tr data-no="${d.no}">
                    <td><input type="checkbox" class="row-cb"></td>
                    <td>${d.no}</td>
                    <td>${d.date}</td>
                    <td>${d.fromAcc}</td>
                    <td>${d.toAcc}</td>
                    <td class="amount">${formatCurrency(d.amount)}</td>
                    <td>${d.chqNo || ''}</td>
                </tr>
            `).join('');
        }

        function openVouModal(edit = null) {
            document.getElementById('vouNo').value = edit ? edit.no : 'C-Vou-' + TransactionsBrain.getNextNo('CV');
            document.getElementById('vouDate').value = edit ? edit.date : new Date().toLocaleDateString('en-GB');
            document.getElementById('vouAmount').value = edit ? edit.amount : '';
            if(edit) {
                document.getElementById('fromAcc').value = edit.fromAcc;
                document.getElementById('toAcc').value = edit.toAcc;
            }
            document.getElementById('vouModal').style.display = 'flex';
        }

        function saveVou() {
            const vou = {
                no: document.getElementById('vouNo').value,
                date: document.getElementById('vouDate').value,
                fromAcc: document.getElementById('fromAcc').value,
                toAcc: document.getElementById('toAcc').value,
                amount: parseFloat(document.getElementById('vouAmount').value),
                chqNo: document.getElementById('chqNo').value,
                particular: document.getElementById('vouParticular').value
            };
            if(vou.fromAcc === vou.toAcc) { showToast('Source & Destination must be different', 'error'); return; }
            TransactionsBrain.saveVoucher(vou, 'contra');
            closeVouModal(); renderTable(); showToast('Contra record saved');
        }

        function closeVouModal() { document.getElementById('vouModal').style.display = 'none'; }
        
        function handleExcelUpload(input) {
            showToast('Importing Contra entries...', 'info');
            setTimeout(() => {
                TransactionsBrain.saveVoucher({ no: 'C-Bulk1', date: '01/04/2026', fromAcc: 'Cash', toAcc: 'Saraswat Bank', amount: 5000, particular: 'Excel Import' }, 'contra');
                renderTable(); showToast('Entries imported');
            }, 800);
        }

        function downloadTemplate() {
            const csv = "Voucher No,Date,From Account,To Account,Amount\nC-001,01/04/2026,Cash in Hand,Bank Name,1000";
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url); a.setAttribute('download', 'Contra_Template.csv'); a.click();
        }

        function alterVou() {
            const selected = document.querySelectorAll('.row-cb:checked');
            if (selected.length !== 1) { showToast('Please select exactly one record to alter', 'error'); return; }
            const no = selected[0].closest('tr').dataset.no;
            const data = TransactionsBrain.getVouchers('contra');
            const vou = data.find(d => d.no === no);
            if (vou) openVouModal(vou);
        }

        function multiDelete() {
            const selected = document.querySelectorAll('.row-cb:checked');
            if (selected.length === 0) { showToast('Please select records to delete', 'error'); return; }
            if (confirm(`Delete ${selected.length} records?`)) {
                const ids = Array.from(selected).map(cb => cb.closest('tr').dataset.no);
                TransactionsBrain.delete(TRANS_DB.CONTRA_VOUCHERS, ids, 'no');
                renderTable(); showToast(`Deleted ${selected.length} records`);
            }
        }

        function toggleSelectAll(m) { document.querySelectorAll('.row-cb').forEach(c => c.checked = m.checked); }
        document.addEventListener('DOMContentLoaded', renderTable);
    </script>
</body>
</html>
